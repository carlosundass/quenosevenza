<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Pago - Que No Se Venza</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet" />
    
    <!-- FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .checkout-card { background: var(--card-bg); padding: 40px 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .checkout-card img { height: 60px; object-fit: contain; margin-bottom: 15px; }
        .checkout-card h1 { color: var(--primary); font-size: 24px; margin-bottom: 8px; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .checkout-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; }
        #loginPagoView { display: none; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; padding-left: 10px; }
        .input-group input { width: 100%; padding: 14px 20px; border: 2px solid #E5E7EB; border-radius: 30px; font-size: 14px; outline: none; transition: border-color 0.3s; }
        .input-group input:focus { border-color: var(--primary); }
        #detallePagoView { display: none; text-align: left; }
        .ticket { background: #F9FAFB; border: 2px dashed #E5E7EB; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .ticket-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .ticket-row strong { color: var(--text-main); }
        .ticket-total { border-top: 2px dashed #E5E7EB; padding-top: 15px; margin-top: 10px; font-size: 18px; font-weight: 700; display: flex; justify-content: space-between; color: var(--primary); }
        .btn-submit { width: 100%; max-width: 300px; display: flex; justify-content: center; align-items: center; gap: 8px; margin: 0 auto; background-color: var(--primary); color: white; border: none; padding: 14px; border-radius: 30px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background-color 0.3s; }
        .btn-submit:hover { background-color: var(--primary-hover); }
        .btn-submit:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #059669; }
        .btn-cancel { background: transparent; color: var(--text-muted); border: none; font-size: 13px; font-weight: 500; cursor: pointer; margin: 20px auto 0 auto; display: flex; justify-content: center; align-items: center; gap: 4px; text-decoration: underline; }
        .footer { text-align: center; color: var(--text-muted); font-size: 12px; margin-top: 30px; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; border-radius: 12px; padding: 16px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; transform: translateX(120%); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 14px; font-weight: 500;}
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <div id="toastContainer" class="toast-container"></div>

    <div class="checkout-card">
        <img src="img/logo.png" alt="Logo" onerror="this.style.display='none'">
        <h1>Portal de Pago</h1>
        <p>Sistema de gestión de inventarios</p>

        <div id="loginPagoView">
            <p style="margin-bottom: 20px;">Ingresa el correo de tu almacén para buscar tu mensualidad pendiente.</p>
            <div class="input-group">
                <label>Correo electrónico</label>
                <input type="email" id="correoBusqueda" placeholder="ejemplo@almacen.cl" required onkeydown="if(event.key === 'Enter') buscarCuenta()">
            </div>
            <button id="btnBuscar" class="btn-submit" onclick="buscarCuenta()">
                <span class="material-symbols-rounded">search</span> Buscar cuenta
            </button>
            <button class="btn-cancel" onclick="window.location.href='/login.html'">
                <span class="material-symbols-rounded" style="font-size:16px;">arrow_back</span> Volver al inicio
            </button>
        </div>

        <div id="detallePagoView">
            <div class="ticket">
                <div class="ticket-row">
                    <span style="color:var(--text-muted);">Cliente:</span>
                    <strong id="ticketNombre">-</strong>
                </div>
                <div class="ticket-row">
                    <span style="color:var(--text-muted);">Concepto:</span>
                    <strong>Suscripción Mensual</strong>
                </div>
                <div class="ticket-total">
                    <span>Total a Pagar:</span>
                    <span>$15.000</span>
                </div>
            </div>
            
            <div id="mensajeEstadoPago"></div>
            
            <button id="btnRealizarPago" class="btn-submit btn-success" onclick="simularPago()">
                <span class="material-symbols-rounded">lock</span> Pago Seguro
            </button>
            <button class="btn-cancel" onclick="volverAInicio()">Volver</button>
        </div>
    </div>

    <p class="footer">Desarrollado por Carlos</p>

    <script>
        function showToast(msj, tipo = 'success') {
            const container = document.getElementById('toastContainer'); const toast = document.createElement('div'); toast.className = `toast`;
            let icon = tipo === 'success' ? 'check_circle' : (tipo === 'error' ? 'error' : 'warning'); let color = `var(--${tipo})`;
            toast.innerHTML = `<span class="material-symbols-rounded" style="color: ${color}">${icon}</span> <span style="color: var(--text-main)">${msj}</span>`;
            toast.style.borderLeft = `4px solid ${color}`; container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10); setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 3500);
        }

        let clienteEncontrado = null; let fueBuscadoPorCorreo = false; 
        
        async function iniciarPortal() {
            const idSesion = localStorage.getItem('sesionActual');
            if (idSesion && idSesion !== 'ADMIN_MASTER') {
                try {
                    const doc = await db.collection('clientes').doc(String(idSesion)).get();
                    if(doc.exists) {
                        clienteEncontrado = doc.data();
                        mostrarDetallePago();
                        return;
                    }
                } catch(e) {
                    console.log("Error buscando sesión en Firebase.");
                }
            }
            document.getElementById('loginPagoView').style.display = 'block';
        }

        async function buscarCuenta() {
            const correo = document.getElementById('correoBusqueda').value.trim();
            if(!correo) return;

            const btn = document.getElementById('btnBuscar');
            btn.disabled = true; btn.innerHTML = `<span class="material-symbols-rounded">sync</span> Buscando...`;

            try {
                const snapshot = await db.collection('clientes').where('correo', '==', correo).get();
                if (snapshot.empty) {
                    showToast('No encontramos ninguna cuenta asociada a este correo.', 'error');
                } else {
                    snapshot.forEach(doc => { clienteEncontrado = doc.data(); });
                    fueBuscadoPorCorreo = true; 
                    document.getElementById('loginPagoView').style.display = 'none'; 
                    mostrarDetallePago();
                }
            } catch(e) {
                showToast('Error al conectar con el servidor.', 'error');
            } finally {
                btn.disabled = false; btn.innerHTML = `<span class="material-symbols-rounded">search</span> Buscar cuenta`;
            }
        }

        function mostrarDetallePago() {
            document.getElementById('ticketNombre').innerText = clienteEncontrado.nombre;
            
            // VERIFICACIÓN DE PAGO DOBLE
            const hoy = new Date(); hoy.setHours(0,0,0,0);
            const [y, m, d] = clienteEncontrado.fechaPago.split('-');
            const fechaPago = new Date(y, m - 1, d);
            const diasRestantes = Math.ceil((fechaPago.getTime() - hoy.getTime()) / (1000 * 3600 * 24));
            
            const btnPagar = document.getElementById('btnRealizarPago');
            const msjEstado = document.getElementById('mensajeEstadoPago');
            
            if (diasRestantes > 5) {
                msjEstado.innerHTML = `<div style="background:#D1FAE5; color:#065F46; padding:12px; border-radius:12px; margin-bottom:15px; font-size:13px; font-weight:600; text-align:center;"><span class="material-symbols-rounded" style="vertical-align:middle; font-size:18px;">check_circle</span> Tu mensualidad está al día. Tienes cobertura hasta el ${d}/${m}/${y}.</div>`;
                btnPagar.style.display = 'none';
            } else {
                msjEstado.innerHTML = '';
                btnPagar.style.display = 'flex';
            }

            document.getElementById('detallePagoView').style.display = 'block';
        }

        async function simularPago() {
            const btn = document.getElementById('btnRealizarPago');
            btn.disabled = true; btn.innerHTML = `<span class="material-symbols-rounded">sync</span> Procesando...`;

            try {
                const estabaSuspendido = !clienteEncontrado.activo;
                let [y, m, d] = clienteEncontrado.fechaPago.split('-'); let mesNumerico = parseInt(m) - 1; let anioNumerico = parseInt(y);
                mesNumerico++; if (mesNumerico > 11) { mesNumerico = 0; anioNumerico++; }
                let nuevaFecha = new Date(anioNumerico, mesNumerico, clienteEncontrado.diaCobro);
                if (nuevaFecha.getMonth() !== mesNumerico) { nuevaFecha = new Date(anioNumerico, mesNumerico + 1, 0); }
                const yyyy = nuevaFecha.getFullYear(); const mm = String(nuevaFecha.getMonth() + 1).padStart(2, '0'); const dd = String(nuevaFecha.getDate()).padStart(2, '0');
                
                const nuevaFechaStr = `${yyyy}-${mm}-${dd}`;

                // ACTUALIZAR EN FIREBASE
                await db.collection('clientes').doc(String(clienteEncontrado.id)).update({
                    fechaPago: nuevaFechaStr,
                    activo: true
                });
                
                showToast('¡Pago procesado con éxito!', 'success');
                setTimeout(() => {
                    if (estabaSuspendido || fueBuscadoPorCorreo) {
                        localStorage.removeItem('sesionActual'); window.location.href = '/login.html'; 
                    } else { window.location.href = '/'; }
                }, 2000);
            } catch(e) {
                showToast("Hubo un error al procesar el pago.", "error");
                btn.disabled = false; btn.innerHTML = `<span class="material-symbols-rounded">lock</span> Pago Seguro`;
            }
        }

        function volverAInicio() {
            if(localStorage.getItem('sesionActual') && !fueBuscadoPorCorreo && localStorage.getItem('sesionActual') !== 'ADMIN_MASTER') window.location.href = '/'; else window.location.href = '/login.html';
        }
        
        iniciarPortal();
    </script>
    <script>
    // Bloquear clic derecho
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Bloquear teclas de herramientas de desarrollador
    document.onkeydown = function(e) {
        // Bloquear F12
        if(e.keyCode == 123) { return false; }
        // Bloquear Ctrl+Shift+I (Inspeccionar)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        // Bloquear Ctrl+Shift+C (Inspeccionar elemento)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
        // Bloquear Ctrl+Shift+J (Consola)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
        // Bloquear Ctrl+U (Ver código fuente)
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
    }
</script>
</body>
</html>
