<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Que No Se Venza</title>
    
    <!-- FUENTES E ÍCONOS -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0" rel="stylesheet" />
    
    <!-- FIREBASE SCRIPTS -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="firebase-config.js"></script>

    <style>
        :root { --primary: #4F46E5; --primary-hover: #4338CA; --bg-color: #F3F4F6; --card-bg: #FFFFFF; --text-main: #1F2937; --text-muted: #6B7280; --success: #10B981; --warning: #F59E0B; --danger: #EF4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        
        .navbar { background: #111827; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .navbar .logo-container { display: flex; align-items: center; gap: 12px; }
        .navbar h2 { font-size: 18px; font-weight: 600; margin: 0; display: flex; align-items: center; gap: 8px;}
        .btn-logout { background: transparent; border: 1px solid white; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 6px; transition: 0.3s; }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        
        .grid-dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; }
        @media (min-width: 800px) { .grid-dashboard { grid-template-columns: 350px 1fr; } }
        
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); border: 1px solid #E5E7EB; }
        .card-title { font-size: 16px; font-weight: 600; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 5px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 15px; border: 2px solid #E5E7EB; border-radius: 12px; font-size: 14px; outline: none; transition: 0.3s; }
        .input-group input:focus, .input-group select:focus { border-color: var(--primary); }
        
        .btn-submit { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 15px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-submit:hover { background: var(--primary-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #059669; }

        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #F9FAFB; padding: 12px 15px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid #E5E7EB; }
        td { padding: 15px; border-bottom: 1px solid #E5E7EB; font-size: 14px; vertical-align: middle; }
        
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px;}
        .status-active { background: #D1FAE5; color: #065F46; }
        .status-inactive { background: #FEE2E2; color: #991B1B; }
        
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 8px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; color: white;}
        .btn-toggle { background: var(--warning); } .btn-toggle:hover { background: #D97706; }
        .btn-delete { background: var(--danger); } .btn-delete:hover { background: #DC2626; }
        .btn-add-time { background: var(--success); } .btn-add-time:hover { background: #059669; }
    </style>
</head>
<body>

    <!-- SEGURIDAD: VERIFICAR SI ES EL ADMINISTRADOR MAESTRO -->
    <script>
        if (localStorage.getItem('sesionActual') !== 'ADMIN_MASTER') {
            window.location.href = '/login.html';
        }
    </script>

    <nav class="navbar">
        <div class="logo-container">
            <h2><span class="material-symbols-rounded">admin_panel_settings</span> Panel Maestro</h2>
        </div>
        <button class="btn-logout" onclick="cerrarSesionAdmin()">Salir <span class="material-symbols-rounded">logout</span></button>
    </nav>

    <div class="container">
        <div class="grid-dashboard">
            
            <!-- COLUMNA IZQUIERDA: CONFIGURACIÓN Y FORMULARIO -->
            <div class="left-col">
                
                <!-- NUEVA TARJETA: CONFIGURACIÓN DE PRECIOS -->
                <div class="card" style="margin-bottom: 20px; border-color: var(--success);">
                    <h3 class="card-title" style="color: var(--success);"><span class="material-symbols-rounded">payments</span> Valor Mensualidad</h3>
                    <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 15px;">Este es el precio que Mercado Pago cobrará en las suscripciones automáticas.</p>
                    
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="inputPrecioSaaS" placeholder="Ej: 15000" style="flex: 1; padding: 12px; border-radius: 12px; border: 2px solid #E5E7EB; outline: none; font-size: 15px; font-weight: 600;">
                        <button class="btn-submit btn-success" style="width: auto; padding: 0 20px;" onclick="guardarPrecioSaaS()">
                            <span class="material-symbols-rounded">save</span> Guardar
                        </button>
                    </div>
                </div>

                <!-- TARJETA: CREAR NUEVO CLIENTE -->
                <div class="card">
                    <h3 class="card-title"><span class="material-symbols-rounded">person_add</span> Nuevo Cliente</h3>
                    <div class="input-group">
                        <label>ID / RUT (Sin puntos ni guión)</label>
                        <input type="text" id="cliId" placeholder="Ej: 123456789">
                    </div>
                    <div class="input-group">
                        <label>Nombre del Local</label>
                        <input type="text" id="cliNombre" placeholder="Ej: Minimarket Los Andes">
                    </div>
                    <div class="input-group">
                        <label>Correo Electrónico (Para pagos)</label>
                        <input type="email" id="cliCorreo" placeholder="ejemplo@correo.cl">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div class="input-group">
                            <label>Clave Admin</label>
                            <input type="text" id="cliClaveAdmin" placeholder="Ej: 1234">
                        </div>
                        <div class="input-group">
                            <label>Clave Vendedor</label>
                            <input type="text" id="cliClaveVend" placeholder="Ej: 0000">
                        </div>
                    </div>
                    <button class="btn-submit" onclick="crearCliente()">
                        <span class="material-symbols-rounded">add_circle</span> Crear Cuenta
                    </button>
                </div>
            </div>

            <!-- COLUMNA DERECHA: LISTA DE CLIENTES -->
            <div class="right-col">
                <div class="card">
                    <h3 class="card-title"><span class="material-symbols-rounded">group</span> Clientes Registrados</h3>
                    
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Local / Correo</th>
                                    <th>Claves (A / V)</th>
                                    <th>Vencimiento</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaClientes">
                                <tr><td colspan="5" style="text-align: center;">Cargando clientes...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // -----------------------------------------------------------------
        // 1. GESTIÓN DEL PRECIO DINÁMICO (LA NUEVA FUNCIÓN)
        // -----------------------------------------------------------------
        db.collection('sistema').doc('configuracion').onSnapshot((doc) => {
            if (doc.exists && doc.data().precioMensualidad) {
                document.getElementById('inputPrecioSaaS').value = doc.data().precioMensualidad;
            } else {
                document.getElementById('inputPrecioSaaS').value = 15000; // Valor por defecto visual
            }
        });

        async function guardarPrecioSaaS() {
            const nuevoPrecio = document.getElementById('inputPrecioSaaS').value;
            if (!nuevoPrecio || isNaN(nuevoPrecio) || Number(nuevoPrecio) < 1000) {
                return alert("Ingresa un precio numérico válido mayor a 1000.");
            }

            try {
                await db.collection('sistema').doc('configuracion').set({
                    precioMensualidad: Number(nuevoPrecio)
                }, { merge: true });
                alert("¡Precio actualizado! El nuevo valor ya está operando en la pasarela de Mercado Pago.");
            } catch (e) {
                console.error(e);
                alert("Hubo un error al guardar el precio.");
            }
        }

        // -----------------------------------------------------------------
        // 2. GESTIÓN DE CLIENTES
        // -----------------------------------------------------------------
        function formatearFecha(fechaStr) {
            if(!fechaStr) return 'Sin fecha';
            const partes = fechaStr.split('-');
            if(partes.length !== 3) return fechaStr;
            return `${partes[2]}/${partes[1]}/${partes[0]}`; // DD/MM/YYYY
        }

        db.collection('clientes').onSnapshot(snapshot => {
            const tbody = document.getElementById('tablaClientes');
            tbody.innerHTML = '';
            
            if (snapshot.empty) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No hay clientes registrados.</td></tr>`;
                return;
            }

            snapshot.forEach(doc => {
                const c = doc.data();
                
                // Determinar estado visual
                const hoy = new Date(); hoy.setHours(0,0,0,0);
                const [y, m, d] = c.fechaPago ? c.fechaPago.split('-') : ['2000','01','01'];
                const fPago = new Date(y, m-1, d);
                const diasRestantes = Math.ceil((fPago - hoy) / (1000 * 3600 * 24));
                
                let badgeStatus = '';
                if (!c.activo) {
                    badgeStatus = `<span class="status-badge status-inactive"><span class="material-symbols-rounded" style="font-size:14px;">block</span> Suspendido</span>`;
                } else if (diasRestantes < 0) {
                    badgeStatus = `<span class="status-badge status-inactive"><span class="material-symbols-rounded" style="font-size:14px;">warning</span> Vencido</span>`;
                } else {
                    badgeStatus = `<span class="status-badge status-active"><span class="material-symbols-rounded" style="font-size:14px;">check_circle</span> Al día</span>`;
                }

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <strong>${c.nombre}</strong><br>
                        <span style="font-size:12px; color:var(--text-muted)">${c.correo || 'Sin correo'}</span><br>
                        <span style="font-size:11px; color:var(--text-muted)">ID: ${c.id}</span>
                    </td>
                    <td>
                        <span style="background:#F3F4F6; padding:2px 6px; border-radius:4px; font-family:monospace;">${c.clave}</span> / 
                        <span style="background:#F3F4F6; padding:2px 6px; border-radius:4px; font-family:monospace;">${c.claveVendedor || 'N/A'}</span>
                    </td>
                    <td>
                        <strong style="color:${diasRestantes < 0 ? 'var(--danger)' : 'var(--text-main)'}">${formatearFecha(c.fechaPago)}</strong><br>
                        <span style="font-size:11px; color:var(--text-muted)">${diasRestantes >= 0 ? `Quedan ${diasRestantes} días` : `Hace ${Math.abs(diasRestantes)} días`}</span>
                    </td>
                    <td>${badgeStatus}</td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-sm btn-add-time" title="Dar 30 días de acceso" onclick="sumarMes('${c.id}', '${c.fechaPago}')"><span class="material-symbols-rounded">calendar_add_on</span></button>
                            <button class="btn-sm btn-toggle" title="${c.activo ? 'Suspender' : 'Activar'} Sistema" onclick="toggleEstado('${c.id}', ${c.activo})"><span class="material-symbols-rounded">${c.activo ? 'pause_circle' : 'play_circle'}</span></button>
                            <button class="btn-sm btn-delete" title="Eliminar Cliente" onclick="eliminarCliente('${c.id}', '${c.nombre}')"><span class="material-symbols-rounded">delete</span></button>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        });

        async function crearCliente() {
            const id = document.getElementById('cliId').value.trim();
            const nombre = document.getElementById('cliNombre').value.trim();
            const correo = document.getElementById('cliCorreo').value.trim();
            const claveAdmin = document.getElementById('cliClaveAdmin').value.trim();
            const claveVend = document.getElementById('cliClaveVend').value.trim();

            if (!id || !nombre || !correo || !claveAdmin || !claveVend) {
                return alert("Por favor, completa todos los campos del formulario.");
            }

            // Dar 3 días de prueba por defecto
            const hoy = new Date();
            hoy.setDate(hoy.getDate() + 3);
            const fechaPruebaStr = `${hoy.getFullYear()}-${String(hoy.getMonth()+1).padStart(2,'0')}-${String(hoy.getDate()).padStart(2,'0')}`;

            const nuevoCliente = {
                id: id,
                nombre: nombre,
                correo: correo,
                clave: claveAdmin,
                claveVendedor: claveVend,
                fechaPago: fechaPruebaStr,
                activo: true,
                fechaRegistro: new Date().toISOString()
            };

            try {
                await db.collection('clientes').doc(id).set(nuevoCliente);
                alert(`¡Cliente ${nombre} creado con éxito!`);
                
                // Limpiar inputs
                document.getElementById('cliId').value = ''; document.getElementById('cliNombre').value = '';
                document.getElementById('cliCorreo').value = ''; document.getElementById('cliClaveAdmin').value = '';
                document.getElementById('cliClaveVend').value = '';
            } catch (e) {
                console.error(e);
                alert("Error al crear el cliente en la base de datos.");
            }
        }

        async function sumarMes(id, fechaActualStr) {
            if(confirm("¿Estás seguro de regalar/sumar 30 días de acceso manual a este cliente?")) {
                let [y, m, d] = fechaActualStr.split('-');
                let nuevaF = new Date(y, parseInt(m), d); // JS suma el mes automáticamente al usar parseInt(m)
                const nStr = `${nuevaF.getFullYear()}-${String(nuevaF.getMonth()+1).padStart(2,'0')}-${String(nuevaF.getDate()).padStart(2,'0')}`;
                
                await db.collection('clientes').doc(id).update({ fechaPago: nStr, activo: true });
            }
        }

        async function toggleEstado(id, estadoActual) {
            const accion = estadoActual ? "SUSPENDER" : "REACTIVAR";
            if(confirm(`¿Estás seguro de ${accion} el acceso de este cliente al sistema?`)) {
                await db.collection('clientes').doc(id).update({ activo: !estadoActual });
            }
        }

        async function eliminarCliente(id, nombre) {
            if(confirm(`⚠️ PELIGRO: ¿Estás ABSOLUTAMENTE SEGURO de eliminar al cliente "${nombre}"? Se perderá todo su inventario.`)) {
                if(confirm(`Última advertencia: Esta acción NO se puede deshacer. Escribe "SI" para confirmar.`)) {
                    await db.collection('clientes').doc(id).delete();
                    alert("Cliente eliminado permanentemente.");
                }
            }
        }

        function cerrarSesionAdmin() {
            localStorage.removeItem('sesionActual');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>
